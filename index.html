<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro Focus Timer</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg1: #ff7b54;
      --bg2: #ff416c;
      --card: rgba(255,255,255,0.12);
      --border: rgba(255,255,255,0.18);
      --text: #ffffff;
    }

    body {
      font-family: Arial, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg1), var(--bg2));
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: var(--text);
    }

    .app {
      width: 100%;
      max-width: 900px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 20px;
    }

    .panel {
      background: var(--card);
      border-radius: 20px;
      padding: 25px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .timer {
      font-size: 70px;
      text-align: center;
      margin: 30px 0;
    }

    button {
      padding: 12px 20px;
      margin: 5px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    .start { background: white; }
    .pause { background: #333; color: white; }
    .reset { background: crimson; color: white; }
  </style>
</head>

<body>
  <div class="app">
    <div class="panel">
      <h1>🍅 Pomodoro Timer</h1>

      <div class="timer" id="timer">25:00</div>

      <div style="text-align:center;">
        <button class="start" onclick="startTimer()">Start</button>
        <button class="pause" onclick="pauseTimer()">Pause</button>
        <button class="reset" onclick="resetTimer()">Reset</button>
      </div>
    </div>
  </div>

  <script>
    let time = 25 * 60;
    let interval = null;

    const timerEl = document.getElementById("timer");

    function updateDisplay() {
      let mins = Math.floor(time / 60);
      let secs = time % 60;
      timerEl.textContent =
        String(mins).padStart(2, "0") + ":" + String(secs).padStart(2, "0");
    }

    function startTimer() {
      if (interval) return;

      interval = setInterval(() => {
        if (time > 0) {
          time--;
          updateDisplay();
        }
      }, 1000);
    }

    function pauseTimer() {
      clearInterval(interval);
      interval = null;
    }

    function resetTimer() {
      pauseTimer();
      time = 25 * 60;
      updateDisplay();
    }

    updateDisplay();
  </script>
</body>
</html>
